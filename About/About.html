<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everscops — Employee Handbook</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --orange: #FF6B00;
            --orange-light: #FF8C33;
            --orange-dark: #CC5500;
            --gold: #D4A574;
            --gold-light: #E8C9A0;
            --dark: #0A0A14;
            --dark-2: #12121F;
            --dark-3: #1A1A2E;
            --dark-4: #222240;
            --text: #F0EDE8;
            --text-muted: #9B97A8;
            --card: rgba(26, 26, 46, 0.8);
            --card-border: rgba(255, 107, 0, 0.15);
            --glass: rgba(255, 255, 255, 0.03);
            --shadow-orange: 0 8px 32px rgba(255, 107, 0, 0.2);
            --shadow-dark: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.8;
            transition: direction 0s;
        }

        html[dir="rtl"] body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
        }

        /* ===== BACKGROUND EFFECTS ===== */
        .bg-effects {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .bg-effects .orb {
            position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.15;
        }
        .bg-effects .orb-1 {
            width: 600px; height: 600px; background: var(--orange);
            top: -200px; right: -100px; animation: floatOrb 20s ease-in-out infinite;
        }
        .bg-effects .orb-2 {
            width: 500px; height: 500px; background: var(--gold);
            bottom: -150px; left: -100px; animation: floatOrb 25s ease-in-out infinite reverse;
        }
        .bg-effects .orb-3 {
            width: 400px; height: 400px; background: var(--orange-dark);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            animation: floatOrb 18s ease-in-out infinite 5s;
        }
        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.1); }
            50% { transform: translate(-20px, 30px) scale(0.95); }
            75% { transform: translate(40px, 20px) scale(1.05); }
        }

        .egyptian-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; opacity: 0.02;
            background-image:
                linear-gradient(30deg, var(--gold) 12%, transparent 12.5%, transparent 87%, var(--gold) 87.5%, var(--gold)),
                linear-gradient(150deg, var(--gold) 12%, transparent 12.5%, transparent 87%, var(--gold) 87.5%, var(--gold)),
                linear-gradient(30deg, var(--gold) 12%, transparent 12.5%, transparent 87%, var(--gold) 87.5%, var(--gold)),
                linear-gradient(150deg, var(--gold) 12%, transparent 12.5%, transparent 87%, var(--gold) 87.5%, var(--gold)),
                linear-gradient(60deg, var(--gold-light) 25%, transparent 25.5%, transparent 75%, var(--gold-light) 75%, var(--gold-light)),
                linear-gradient(60deg, var(--gold-light) 25%, transparent 25.5%, transparent 75%, var(--gold-light) 75%, var(--gold-light));
            background-size: 80px 140px;
            background-position: 0 0, 0 0, 40px 70px, 40px 70px, 0 0, 40px 70px;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--orange-dark); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--orange); }

        /* ===== NAVIGATION ===== */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            padding: 0 2rem; height: 72px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--card-border);
            transition: all 0.4s ease;
        }
        .navbar.scrolled {
            height: 60px; background: rgba(10, 10, 20, 0.95);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .nav-right { display: flex; align-items: center; gap: 12px; }

        .lang-toggle {
            display: flex; align-items: center; gap: 6px;
            padding: 0.45rem 1rem; border-radius: 10px;
            background: rgba(255, 107, 0, 0.1);
            border: 1px solid rgba(255, 107, 0, 0.25);
            color: var(--orange-light); font-family: inherit;
            font-size: 0.78rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s ease;
            white-space: nowrap;
        }
        .lang-toggle:hover {
            background: rgba(255, 107, 0, 0.2);
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.15);
        }
        .lang-toggle i { font-size: 0.85rem; }

        .nav-logo {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none;
        }
        .nav-logo img {
            height: 60px;
            filter: drop-shadow(0 2px 8px rgba(255, 107, 0, 0.4));
            transition: transform 0.3s ease;
        }
        .nav-logo:hover img { transform: scale(1.05); }

        .nav-links {
            display: flex; align-items: center; gap: 0.25rem; list-style: none;
        }
        .nav-links a {
            text-decoration: none; color: var(--text-muted);
            font-size: 0.85rem; font-weight: 500;
            padding: 0.5rem 1rem; border-radius: 8px;
            transition: all 0.3s ease; position: relative;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--orange); background: rgba(255, 107, 0, 0.08);
        }

        .nav-toggle {
            display: none; flex-direction: column; gap: 5px;
            cursor: pointer; padding: 8px; border: none; background: none;
        }
        .nav-toggle span {
            display: block; width: 24px; height: 2px;
            background: var(--text); border-radius: 2px; transition: all 0.3s ease;
        }
        .nav-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .nav-toggle.active span:nth-child(2) { opacity: 0; }
        .nav-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        /* ===== MAIN CONTENT ===== */
        .main-content { position: relative; z-index: 1; padding-top: 72px; }

        /* ===== HERO SECTION ===== */
        .hero {
            min-height: 92vh; display: flex; align-items: center; justify-content: center;
            padding: 6rem 2rem; position: relative; overflow: hidden;
        }
        .hero-inner { text-align: center; max-width: 900px; perspective: 1000px; }

        .hero-logo-container {
            margin-bottom: 2rem; transform-style: preserve-3d;
            animation: logoFloat 6s ease-in-out infinite;
        }
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) rotateX(0) rotateY(0); }
            25% { transform: translateY(-10px) rotateX(2deg) rotateY(-2deg); }
            75% { transform: translateY(5px) rotateX(-1deg) rotateY(1deg); }
        }
        .hero-logo-container img {
            height: 100px;
            filter: drop-shadow(0 10px 30px rgba(255, 107, 0, 0.5));
        }

        .hero-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 0.5rem 1.5rem; border-radius: 50px;
            background: rgba(255, 107, 0, 0.1);
            border: 1px solid rgba(255, 107, 0, 0.25);
            color: var(--orange-light); font-size: 0.8rem; font-weight: 600;
            margin-bottom: 2rem; animation: fadeInDown 0.8s ease-out;
        }
        .hero-badge .dot {
            width: 8px; height: 8px; background: var(--orange); border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 900;
            line-height: 1.15; margin-bottom: 1.5rem;
            animation: fadeInUp 1s ease-out 0.2s both;
        }
        .hero h1 .highlight {
            background: linear-gradient(135deg, var(--orange), var(--gold-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .hero p {
            font-size: 1.15rem; color: var(--text-muted); max-width: 650px;
            margin: 0 auto 2.5rem; animation: fadeInUp 1s ease-out 0.4s both;
        }
        .hero-buttons {
            display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .btn-primary {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 0.9rem 2rem;
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            color: #fff; border: none; border-radius: 12px;
            font-family: inherit; font-size: 0.95rem; font-weight: 700;
            cursor: pointer; text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(255, 107, 0, 0.3);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(255, 107, 0, 0.5); }

        .btn-secondary {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 0.9rem 2rem; background: var(--glass); color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            font-family: inherit; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; text-decoration: none; transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08); border-color: var(--orange);
            color: var(--orange); transform: translateY(-3px);
        }

        /* 3D floating cards */
        .hero-3d-elements {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; perspective: 1200px;
        }
        .float-card {
            position: absolute; background: var(--card);
            border: 1px solid var(--card-border); border-radius: 16px;
            padding: 1rem 1.5rem; backdrop-filter: blur(10px);
            box-shadow: var(--shadow-dark); animation: floatCard 8s ease-in-out infinite;
        }
        .float-card-1 { top: 15%; left: 5%; animation-delay: 0s; transform: rotateY(-8deg) rotateX(5deg); }
        .float-card-2 { top: 20%; right: 5%; animation-delay: -3s; transform: rotateY(8deg) rotateX(-5deg); }
        .float-card-3 { bottom: 15%; left: 8%; animation-delay: -5s; transform: rotateY(-5deg) rotateX(8deg); }
        .float-card-4 { bottom: 20%; right: 8%; animation-delay: -2s; transform: rotateY(6deg) rotateX(-3deg); }
        @keyframes floatCard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .float-card .fc-icon {
            width: 40px; height: 40px; border-radius: 10px;
            background: rgba(255, 107, 0, 0.15);
            display: flex; align-items: center; justify-content: center;
            color: var(--orange); font-size: 1rem; margin-bottom: 0.5rem;
        }
        .float-card .fc-label { font-size: 0.7rem; color: var(--text-muted); }
        .float-card .fc-value { font-size: 0.9rem; font-weight: 700; color: var(--text); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* ===== SECTION COMMON ===== */
        .section { padding: 5rem 2rem; max-width: 1200px; margin: 0 auto; }
        .section-header { text-align: center; margin-bottom: 4rem; }
        .section-label {
            display: inline-flex; align-items: center; gap: 8px;
            font-size: 0.8rem; font-weight: 700; color: var(--orange);
            text-transform: uppercase; letter-spacing: 3px; margin-bottom: 1rem;
        }
        .section-label::before, .section-label::after {
            content: ''; width: 30px; height: 1px; background: var(--orange); opacity: 0.5;
        }
        .section-title { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; line-height: 1.2; margin-bottom: 1rem; }
        .section-subtitle { font-size: 1.05rem; color: var(--text-muted); max-width: 600px; margin: 0 auto; }

        /* ===== ABOUT SECTION ===== */
        .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; }
        .about-visual { position: relative; perspective: 1000px; }
        .about-card-3d {
            background: linear-gradient(145deg, var(--dark-3), var(--dark-2));
            border: 1px solid var(--card-border); border-radius: 24px; padding: 3rem;
            position: relative; overflow: hidden; transform-style: preserve-3d;
            transition: transform 0.5s ease; box-shadow: var(--shadow-dark);
        }
        .about-card-3d:hover { transform: rotateY(-5deg) rotateX(5deg) scale(1.02); }
        .about-card-3d::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--orange), var(--gold), var(--orange));
        }
        .about-card-3d .year {
            font-size: 5rem; font-weight: 900;
            background: linear-gradient(135deg, var(--orange), var(--gold-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            line-height: 1; margin-bottom: 1rem;
        }
        .about-card-3d .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 2rem; }
        .stat-item .stat-num { font-size: 1.8rem; font-weight: 800; color: var(--orange); }
        .stat-item .stat-label { font-size: 0.8rem; color: var(--text-muted); }
        .about-text h3 { font-size: 1.6rem; font-weight: 800; margin-bottom: 1rem; }
        .about-text p { color: var(--text-muted); font-size: 1rem; margin-bottom: 1.5rem; line-height: 1.9; }
        .about-text .quote-line {
            color: var(--gold-light); font-weight: 600; font-size: 0.95rem;
        }
        html[dir="rtl"] .about-text .quote-line i { margin-left: 8px; margin-right: 0; }
        html[dir="ltr"] .about-text .quote-line i { margin-right: 8px; margin-left: 0; }

        /* ===== VALUES SECTION ===== */
        .values-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        .value-card {
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 2.5rem 2rem; text-align: center;
            position: relative; overflow: hidden; transform-style: preserve-3d;
            transition: all 0.4s ease; cursor: default;
        }
        .value-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--orange), transparent);
            opacity: 0; transition: opacity 0.4s ease;
        }
        .value-card:hover::before { opacity: 1; }
        .value-card:hover {
            transform: translateY(-8px) rotateX(5deg);
            border-color: rgba(255, 107, 0, 0.3);
            box-shadow: var(--shadow-orange), var(--shadow-dark);
        }
        .value-icon {
            width: 70px; height: 70px; border-radius: 20px;
            background: linear-gradient(135deg, rgba(255, 107, 0, 0.15), rgba(212, 165, 116, 0.1));
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem; font-size: 1.5rem; color: var(--orange);
            transition: all 0.4s ease;
        }
        .value-card:hover .value-icon {
            transform: translateZ(30px) scale(1.1);
            background: linear-gradient(135deg, var(--orange), var(--orange-dark)); color: #fff;
        }
        .value-card h4 { font-size: 1.15rem; font-weight: 700; margin-bottom: 0.75rem; }
        .value-card p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.7; }

        /* ===== MISSION SECTION ===== */
        .mission-section {
            background: linear-gradient(180deg, transparent, rgba(255, 107, 0, 0.03), transparent);
            border-top: 1px solid var(--card-border); border-bottom: 1px solid var(--card-border);
        }
        .mission-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
        .mission-card {
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: 24px; padding: 3rem; position: relative; overflow: hidden;
            transform-style: preserve-3d; transition: all 0.5s ease;
        }
        .mission-card:hover {
            transform: perspective(800px) rotateY(-3deg) translateZ(10px);
            box-shadow: var(--shadow-orange);
        }
        .mission-card .mc-icon {
            width: 60px; height: 60px; border-radius: 16px;
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; color: #fff; margin-bottom: 1.5rem;
        }
        .mission-card h3 { font-size: 1.4rem; font-weight: 800; margin-bottom: 1rem; }
        .mission-card p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.9; }
        .mission-values-list { list-style: none; margin-top: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
        .mission-values-list li {
            display: flex; align-items: center; gap: 12px;
            font-size: 0.92rem; color: var(--text-muted);
            padding: 0.5rem 1rem; border-radius: 10px; background: var(--glass);
            transition: all 0.3s ease;
        }
        html[dir="rtl"] .mission-values-list li:hover { background: rgba(255, 107, 0, 0.08); color: var(--text); transform: translateX(-5px); }
        html[dir="ltr"] .mission-values-list li:hover { background: rgba(255, 107, 0, 0.08); color: var(--text); transform: translateX(5px); }
        .mission-values-list li i { color: var(--orange); font-size: 0.8rem; }

        /* ===== EVP SECTION ===== */
        .evp-wrapper { margin-top: 4rem; }
        .evp-card {
            background: linear-gradient(145deg, rgba(255, 107, 0, 0.06), rgba(26, 26, 46, 0.9));
            border: 1px solid rgba(255, 107, 0, 0.2);
            border-radius: 24px; padding: 3rem; position: relative;
            overflow: hidden; transform-style: preserve-3d;
            transition: all 0.5s ease;
        }
        .evp-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--orange), var(--gold), var(--orange));
        }
        .evp-card::after {
            content: ''; position: absolute; top: -50%; right: -20%; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255, 107, 0, 0.08), transparent 70%);
            border-radius: 50%; pointer-events: none;
        }
        .evp-card:hover {
            transform: perspective(800px) rotateY(-2deg) rotateX(1deg);
            box-shadow: var(--shadow-orange);
        }
        .evp-title {
            font-size: 1.1rem; font-weight: 800; color: var(--orange);
            text-transform: uppercase; letter-spacing: 3px; margin-bottom: 0.5rem;
        }
        .evp-subtitle {
            font-size: 1.6rem; font-weight: 800; margin-bottom: 2rem;
            line-height: 1.3;
        }
        .evp-subtitle .highlight {
            background: linear-gradient(135deg, var(--orange), var(--gold-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .evp-list { display: flex; flex-direction: column; gap: 1rem; position: relative; z-index: 1; }
        .evp-item {
            display: flex; align-items: center; gap: 1rem;
            padding: 1rem 1.5rem; border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease; transform-style: preserve-3d;
        }
        .evp-item:hover {
            background: rgba(255, 107, 0, 0.08);
            border-color: rgba(255, 107, 0, 0.2);
            transform: translateZ(10px) translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 107, 0, 0.1);
        }
        .evp-item-num {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 800; color: #fff; flex-shrink: 0;
        }
        .evp-item-text {
            font-size: 1.05rem; font-weight: 600; color: var(--text);
        }

        /* ===== CODE OF CONDUCT SECTION ===== */
        .coc-wrapper { margin-top: 4rem; }
        .coc-header-card {
            background: linear-gradient(145deg, var(--dark-3), var(--dark-2));
            border: 1px solid var(--card-border); border-radius: 20px;
            padding: 2.5rem; margin-bottom: 1.5rem; position: relative; overflow: hidden;
        }
        .coc-header-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--orange), var(--gold), var(--orange));
        }
        .coc-header-top {
            display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .coc-header-icon {
            width: 60px; height: 60px; border-radius: 16px;
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: #fff; flex-shrink: 0;
        }
        .coc-header-title { font-size: 1.5rem; font-weight: 800; }
        .coc-header-tagline { font-size: 0.9rem; color: var(--orange-light); font-weight: 600; }
        .coc-meta {
            display: flex; flex-wrap: wrap; gap: 1.5rem; font-size: 0.85rem; color: var(--text-muted);
        }
        .coc-meta-item { display: flex; align-items: center; gap: 6px; }
        .coc-meta-item i { color: var(--orange); font-size: 0.8rem; }
        .coc-msg {
            margin-top: 1.5rem; padding: 1.5rem; border-radius: 14px;
            background: rgba(255, 107, 0, 0.04); border: 1px solid rgba(255, 107, 0, 0.1);
            font-size: 0.92rem; color: var(--text-muted); line-height: 1.9;
        }
        .coc-msg strong { color: var(--text); }

        /* Accordion */
        .coc-accordion { display: flex; flex-direction: column; gap: 0.75rem; }
        .coc-accordion-item {
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: 16px; overflow: hidden;
            transition: all 0.4s ease; transform-style: preserve-3d;
        }
        .coc-accordion-item:hover {
            border-color: rgba(255, 107, 0, 0.25);
        }
        .coc-accordion-item.open {
            border-color: rgba(255, 107, 0, 0.3);

        .coc-cv-item i { color: var(--orange); font-size: 0.75rem; }

        /* ===== WHY US SECTION ===== */
        .why-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        .why-card {
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 2rem; display: flex; gap: 1.5rem;

        }

        .why-card h4 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.5rem; }
        .why-card p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.8; }

        /* ===== HR POLICIES SECTION ===== */
        .policies-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        .policy-card {
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 2rem; text-align: center;
            transition: all 0.4s ease; transform-style: preserve-3d;
            position: relative; overflow: hidden;
        }
        .policy-card::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;

        .policy-icon {
            width: 56px; height: 56px; border-radius: 14px;

            margin: 0 auto 1.2rem; font-size: 1.2rem; color: var(--orange);
            transition: all 0.4s ease;
        }
        .policy-card:hover .policy-icon {
            background: var(--orange); color: #fff; transform: translateZ(20px);
        }
        .policy-card h4 { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; }
        .policy-card p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.7; }

        /* ===== RECRUITMENT SECTION ===== */
        .recruitment-steps { display: flex; flex-direction: column; gap: 1rem; max-width: 800px; margin: 0 auto; }
        .rec-step {
            display: flex; align-items: center; gap: 1.5rem;
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: 16px; padding: 1.5rem 2rem;
            transition: all 0.4s ease; transform-style: preserve-3d;
        }
        .rec-step:hover {
            transform: perspective(600px) translateZ(10px); border-color: var(--orange);
            box-shadow: var(--shadow-orange);
        }
        html[dir="rtl"] .rec-step:hover { transform: perspective(600px) translateZ(10px) translateX(-5px); }
        html[dir="ltr"] .rec-step:hover { transform: perspective(600px) translateZ(10px) translateX(5px); }
        .rec-step-num {
            width: 50px; height: 50px; border-radius: 14px;
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: 800; color: #fff; flex-shrink: 0;
        }
        .rec-step-content h4 { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
        .rec-step-content p { font-size: 0.95rem; color: var(--text-muted); }
        .rec-step-arrow { margin-inline-start: auto; color: var(--text-muted); opacity: 0.3; font-size: 1.2rem; }

        /* ===== CULTURE SECTION ===== */
        .culture-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
        .culture-card {
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 2rem 1.5rem; text-align: center;

            font-size: 1.8rem; color: var(--orange); margin-bottom: 1rem;

        }
        .culture-card:hover i { transform: translateZ(25px) scale(1.2); }
        .culture-card h4 { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; }
        .culture-card p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.7; }

        /* ===== WORK ENVIRONMENT ===== */
        .env-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        .env-card {
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 2rem;
            transition: all 0.4s ease; transform-style: preserve-3d;
        }
        .env-card:hover {
            transform: translateY(-5px) perspective(800px) rotateY(-3deg);

        }
        .env-card .env-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .env-card .env-icon {
            width: 48px; height: 48px; border-radius: 12px;
            background: rgba(255, 107, 0, 0.1);
            display: flex; align-items: center; justify-content: center;
            color: var(--orange); font-size: 1.1rem; flex-shrink: 0;
        }
        .env-card h4 { font-size: 1rem; font-weight: 700; }
        .env-card p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.8; }
        .env-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
        .env-tag {
            font-size: 0.72rem; padding: 0.3rem 0.8rem; border-radius: 50px;
            background: rgba(255, 107, 0, 0.08); color: var(--orange-light);
            border: 1px solid rgba(255, 107, 0, 0.15);
        }

        /* ===== CONTACT SECTION ===== */
        .contact-section {
            background: linear-gradient(180deg, transparent, rgba(255, 107, 0, 0.03));
            border-top: 1px solid var(--card-border);
        }
        .contact-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        .contact-card {
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 2.5rem 2rem; text-align: center;
            transition: all 0.4s ease; transform-style: preserve-3d;
        }
        .contact-card:hover {
            transform: translateY(-8px) rotateX(5deg);
            box-shadow: var(--shadow-orange); border-color: rgba(255, 107, 0, 0.3);
        }
        .contact-card i { font-size: 1.5rem; color: var(--orange); margin-bottom: 1rem; display: block; }
        .contact-card h4 { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.5rem; }
        .contact-card p, .contact-card a {
            font-size: 0.95rem; color: var(--text-muted);
            text-decoration: none; transition: color 0.3s;
        }
        .contact-card a:hover { color: var(--orange); }

        /* ===== FOOTER ===== */
        .footer {
            border-top: 1px solid var(--card-border); text-align: center;
        }
        .footer-logo {
            height: 90px; filter: drop-shadow(0 4px 15px rgba(255, 107, 0, 0.3));
        }
        .footer p { font-size: 0.85rem; color: var(--text-muted); }
        .footer .footer-brand { color: var(--orange); font-weight: 700; }

        /* ===== SCROLL REVEAL ===== */
        .reveal { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        .section-divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, var(--card-border), transparent); margin: 0 auto; }

        /* ===== BACK TO TOP ===== */
        .back-to-top {
            position: fixed; bottom: 2rem; left: 2rem;
            width: 48px; height: 48px; border-radius: 14px;
            background: var(--orange); color: #fff; border: none;
            display: flex; align-items: center; justify-content: center;

            opacity: 0; visibility: hidden; transform: translateY(20px);
            transition: all 0.3s ease; z-index: 999;
            box-shadow: 0 4px 20px rgba(255, 107, 0, 0.4);
        }
        .back-to-top.visible { opacity: 1; visibility: visible; transform: translateY(0); }
        .back-to-top:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(255, 107, 0, 0.6); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .values-grid { grid-template-columns: repeat(2, 1fr); }
            .policies-grid { grid-template-columns: repeat(2, 1fr); }
            .culture-grid { grid-template-columns: repeat(2, 1fr); }
            .env-grid { grid-template-columns: repeat(2, 1fr); }
            .coc-core-values-inline { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .nav-links {
                position: fixed; top: 72px; left: 0; right: 0; bottom: 0;
                background: rgba(10, 10, 20, 0.98); backdrop-filter: blur(20px);
                flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem;
                opacity: 0; visibility: hidden; transform: translateY(-20px); transition: all 0.4s ease;
            }
            .nav-links.open { opacity: 1; visibility: visible; transform: translateY(0); }
            .nav-links a { font-size: 1.2rem; padding: 0.8rem 2rem; }
            .nav-toggle { display: flex; }
            .about-grid, .mission-grid { grid-template-columns: 1fr; }
            .values-grid, .why-grid, .policies-grid, .contact-grid { grid-template-columns: 1fr; }
            .culture-grid, .env-grid { grid-template-columns: 1fr; }
            .float-card { display: none; }
            .hero { min-height: 80vh; padding: 4rem 1.5rem; }
            .section { padding: 3rem 1.5rem; }
            .rec-step { flex-direction: column; text-align: center; }
            .rec-step-arrow { display: none; }
            .evp-card { padding: 2rem; }
            .coc-header-card { padding: 1.5rem; }
            .coc-header-top { flex-direction: column; text-align: center; }
            .coc-meta { justify-content: center; }
            .coc-accordion-body-inner { padding-inline-start: 1.5rem; }
            .coc-core-values-inline { grid-template-columns: 1fr; }
        }
        @media (max-width: 480px) {
            .hero h1 { font-size: 2rem; }
            .hero-logo-container img { height: 70px; }
            .about-card-3d { padding: 2rem; }
            .about-card-3d .year { font-size: 3.5rem; }

            .evp-item-text { font-size: 0.92rem; }
        }

        /* ===== LOADING SCREEN ===== */
        .loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;

        .loader.hidden { opacity: 0; visibility: hidden; }
        .loader-logo {
            height: 80px; filter: drop-shadow(0 5px 20px rgba(255, 107, 0, 0.5));

        }
        @keyframes loaderPulse {
            0%, 100% { opacity: 0.5; transform: scale(0.95); }

        .loader-bar { width: 200px; height: 3px; background: var(--dark-3); border-radius: 3px; margin-top: 2rem; overflow: hidden; }
        .loader-bar-inner {
            width: 0%; height: 100%; background: linear-gradient(90deg, var(--orange), var(--gold));

        @keyframes loaderFill { 0% { width: 0%; } 100% { width: 100%; } }

        #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

        /* Sub-section title */
        .sub-section-title {
            text-align: center; font-size: 1.3rem; font-weight: 700;
            margin-bottom: 2rem; color: var(--gold-light);
        }
        html[dir="rtl"] .sub-section-title i { margin-left: 8px; }
        html[dir="ltr"] .sub-section-title i { margin-right: 8px; }
    </style>

                        <div class="coc-msg">
                            <strong><span class="tr" data-en="A Message from Executive Management:" data-ar="رسالة من الإدارة التنفيذية:"></span></strong>
                            <span class="tr" data-en=" Everscopes was built on a simple idea: in real estate, trust is the product. Every consultation, every listing, and every closed deal carries our name and the confidence our clients place in us. As one of New Cairo's fastest-growing real estate agencies, our growth depends entirely on protecting that trust. This Code of Conduct sets out how every member of the Everscops team is expected to behave with clients, colleagues, developers, and partners. We ask every employee to read this Code carefully, raise questions where anything is unclear, and apply it consistently in their daily work." data-ar=" بُنيت إيفرسكوبس على فكرة بسيطة: في العقارات، الثقة هي المنتج. كل استشارة، كل قائمة، وكل صفقة مغلقة تحمل اسمنا والثقة التي يضعها عملاؤنا فينا. كواحدة من أسرع وكالات العقارات نمواً في القاهرة الجديدة، يعتمد نمونا بالكامل على حماية تلك الثقة. تحدد هذه المدونة كيف يُتوقع من كل عضو في فريق إيفرسكوبس التصرف مع العملاء والزملاء والمطورين والشركاء. نطلب من كل موظف قراءة هذه المدونة بعناية، وطرح الأسئلة حيث يكون أي شيء غير واضح، وتطبيقها باستمرار في عمله اليومي."></span>
                        </div>
                    </div>

                    <div class="coc-accordion">
                        <!-- Section 1 -->
                        <div class="coc-accordion-item">
                            <button class="coc-accordion-trigger" aria-expanded="false">
                                <div class="coc-accordion-num">01</div>
                                <div class="coc-accordion-label tr" data-en="Purpose and Scope" data-ar="الغرض والنطاق"></div>
                                <i class="fas fa-chevron-down coc-accordion-arrow"></i>
                            </button>
                            <div class="coc-accordion-body">
                                <div class="coc-accordion-body-inner">
                                    <p><span class="tr" data-en="This Code of Conduct establishes the standards of ethical and professional behavior expected of all Everscops employees, sales consultants, brokers, contractors, and any individual representing Everscops in dealings with clients, property owners, developers, or the public." data-ar="تُنشئ هذه المدونة معايير السلوك الأخلاقي والمهني المتوقع من جميع موظفي إيفرسكوبس ومستشاري المبيعات والوسطاء والمتعاقدين وأي فرد يمثل إيفرسكوبس في تعاملاته مع العملاء أو مالكي العقارات أو المطورين أو الجمهور."></span></p>
                                    <p><span class="tr" data-en="It applies to all Everscopes offices and to all forms of client interaction, including site visits, phone and WhatsApp communication, social media, and digital marketing. Where Egyptian law sets stricter requirements than this Code, the law prevails." data-ar="تنطبق على جميع مكاتب إيفرسكوبس وعلى جميع أشكال التفاعل مع العملاء، بما في ذلك زيارات المواقع والاتصالات الهاتفية والواتساب ووسائل التواصل الاجتماعي والتسويق الرقمي. عندما تضع القوانين المصرية متطلبات أصرم من هذه المدونة، يسود القانون."></span></p>
                                </div>
                            </div>
                        </div>

                        <!-- Section 2 -->
                        <div class="coc-accordion-item">
                            <button class="coc-accordion-trigger" aria-expanded="false">
                                <div class="coc-accordion-num">02</div>
                                <div class="coc-accordion-label tr" data-en="Our Core Values" data-ar="قيمنا الأساسية"></div>
                                <i class="fas fa-chevron-down coc-accordion-arrow"></i>
                            </button>
                            <div class="coc-accordion-body">
                                <div class="coc-accordion-body-inner">
                                    <div class="coc-core-values-inline">
                                        <div class="coc-cv-item"><i class="fas fa-check"></i> <span class="tr" data-en="Integrity — Accurate, honest information with no exaggeration" data-ar="النزاهة — معلومات دقيقة وصادقة بدون مبالغة"></span></div>
                                        <div class="coc-cv-item"><i class="fas fa-check"></i> <span class="tr" data-en="Respect — Fairness, courtesy, and professionalism at all times" data-ar="الاحترام — الإنصاف واللباقة والاحترافية دائماً"></span></div>
                                        <div class="coc-cv-item"><i class="fas fa-check"></i> <span class="tr" data-en="Ownership — Following through on commitments and taking responsibility" data-ar="المسؤولية — الوفاء بالالتزامات وتحمل المسؤولية"></span></div>
                                        <div class="coc-cv-item"><i class="fas fa-check"></i> <span class="tr" data-en="Confidentiality — Protecting client info and commercial terms" data-ar="السرية — حماية معلومات العملاء والشروط التجارية"></span></div>
                                        <div class="coc-cv-item"><i class="fas fa-check"></i> <span class="tr" data-en="Compliance — Following Egyptian regulations and company policies" data-ar="الامتثال — اتباع اللوائح المصرية وسياسات الشركة"></span></div>
                                        <div class="coc-cv-item"><i class="fas fa-check"></i> <span class="tr" data-en="Professional Representation — Accurate presentation in every interaction" data-ar="التمثيل الاحترافي — تقديم دقيق في كل تفاعل"></span></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Section 3 -->
                        <div class="coc-accordion-item">
                            <button class="coc-accordion-trigger" aria-expanded="false">
                                <div class="coc-accordion-num">03</div>
                                <div class="coc-accordion-label tr" data-en="Integrity in Client and Property Dealings" data-ar="النزاهة في تعاملات العملاء والعقارات"></div>
                                <i class="fas fa-chevron-down coc-accordion-arrow"></i>
                            </button>
                            <div class="coc-accordion-body">
                                <div class="coc-accordion-body-inner">
                                    <div class="coc-subsection">
                                        <div class="coc-subsection-title tr" data-en="3.1 Honest Marketing and Representation" data-ar="3.1 التسويق والتمثيل الصادق"></div>
                                        <p><span class="tr" data-en="All property listings, brochures, and advertisements — whether printed, on our website, or on social media — must accurately reflect the property's location, specifications, pricing, payment plans, and delivery dates. Consultants must never overstate a unit's features, fabricate views or finishing levels, or promise delivery dates not confirmed by the developer." data-ar="جميع قوائم العقارات والكتيبات والإعلانات — سواء المطبوعة أو على موقعنا أو على وسائل التواصل الاجتماعي — يجب أن تعكس بدقة موقع العقار ومواصفاته وتسعيره وخطط الدفع وتواريخ التسليم. يجب على المستشارين عدم المبالغة في ميزات الوحدة أو اختلاق إطلالات أو مستويات تشطيب أو الوعد بتواريخ تسليم غير مؤكدة من المطور."></span></p>
                                    </div>
                                    <div class="coc-subsection">
                                        <div class="coc-subsection-title tr" data-en="3.2 Fair Dealing with Buyers, Sellers, and Developers" data-ar="3.2 التعامل العادل مع المشترين والبائعين والمطورين"></div>
                                        <p><span class="tr" data-en="Consultants must disclose all material facts about a property known to them that could affect a client's decision, including known defects, disputes, or restrictions. Consultants must never pressure clients into a purchase, misrepresent competing offers, or create false urgency to close a deal." data-ar="يجب على المستشارين الإفصاح عن جميع الحقائق الجوهرية عن العقار المعروفة لهم والتي قد تؤثر على قرار العميل، بما في ذلك العيوب المعروفة أو النزاعات أو القيود. يجب على المستشارين عدم الضغط على العملاء للشراء أو تضليل العروض المنافسة أو خلق إلحاح كاذب لإغلاق صفقة."></span></p>
                                    </div>
                                    <div class="coc-subsection">
                                        <div class="coc-subsection-title tr" data-en="3.3 Conflicts of Interest" data-ar="3.3 تضارب المصالح"></div>
                                        <p><span class="tr" data-en="Employees must disclose any personal, family, or financial interest in a property or transaction they are involved in — including personally owning or co-owning a listed unit — before proceeding. Undisclosed dual representation or self-dealing is strictly prohibited." data-ar="يجب على الموظفين الإفصاح عن أي مصلحة شخصية أو عائلية أو مالية في عقار أو صفقة يشاركون فيها — بما في ذلك ملكية شخصية أو ملكية مشتركة لوحدة مدرجة — قبل المضي قدماً. التمثل المزدوج غير المفصح عنه أو التعامل الذاتي محظور تماماً."></span></p>
                                    </div>
                                    <div class="coc-subsection">
                                        <div class="coc-subsection-title tr" data-en="3.4 Commissions and Fees" data-ar="3.4 العمولات والرسوم"></div>
                                        <p><span class="tr" data-en="All commissions, referral fees, and incentives must be disclosed transparently and recorded through official Company channels. Employees must not accept undisclosed side payments, under-the-table commissions, or favors from developers, owners, or clients in exchange for preferential treatment, and must not charge clients fees outside of Everscops' approved fee structure." data-ar="جميع العمولات ورسوم الإحالة والحوافز يجب الإفصاح عنها بشفافية وتسجيلها عبر القنوات الرسمية للشركة. يجب على الموظفين عدم قبول مدفوعات جانبية غير معلنة أو عمولات تحت الطاولة أو خدمات من المطورين أو المالكين أو العملاء مقابل معاملة تفضيلية، ويجب عدم فرض رسوم على العملاء خارج هيكل الرسوم المعتمد من إيفرسكوبس."></span></p>
                                    </div>
                                    <div class="coc-subsection">
                                        <div class="coc-subsection-title tr" data-en="3.5 Anti-Money Laundering (AML) and Know-Your-Client (KYC)" data-ar="3.5 مكافحة غسل الأموال ومعرفة العميل"></div>
                                        <p><span class="tr" data-en="Real estate transactions are a recognized channel for money laundering risk. Employees must follow Company KYC procedures for verifying client identity and source of funds, and must immediately report any transaction that appears structured to avoid scrutiny, involves unusual cash payments, or otherwise raises suspicion, in line with Egyptian anti-money laundering law." data-ar="تُعد معاملات العقارات قناة معروفة لمخاطر غسل الأموال. يجب على الموظفين اتباع إجراءات الشركة لمعرفة العميل للتحقق من هوية العميل ومصادر الأموال، والإبلاغ فوراً عن أي معاملة تبدو مهيكلة لتجنب الفحص أو تتضمن مدفوعات نقدية غير عادية أو تثير الشبهات بطريقة أخرى، وفقاً لقانون مكافحة غسل الأموال المصري."></span></p>
                                    </div>
                                    <div class="coc-subsection">
                                        <div class="coc-subsection-title tr" data-en="3.6 Handling of Client Funds and Documents" data-ar="3.6 التعامل مع أموال ومستندات العملاء"></div>
                                        <p><span class="tr" data-en="Reservation deposits, contracts, and official documents must be handled exactly according to Company procedure, recorded promptly, and never held in an employee's personal account or custody beyond what is required to complete an authorized step in the transaction." data-ar="يجب التعامل مع ودائع الحجز والعقود والمستندات الرسمية وفقاً تماماً لإجراءات الشركة، وتسجيلها فوراً، وعدم الاحتفاظ بها في حساب الموظف الشخصي أو عهدته أكثر مما يلزم لإتمام خطوة مرخصة في المعاملة."></span></p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Section 4 -->
                        <div class="coc-accordion-item">
                            <button class="coc-accordion-trigger" aria-expanded="false">
                                <div class="coc-accordion-num">04</div>

                                <i class="fas fa-chevron-down coc-accordion-arrow"></i>
                            </button>
                            <div class="coc-accordion-body">
                                <div class="coc-accordion-body-inner">
                                    <div class="coc-subsection">
                                        <div class="coc-subsection-title tr" data-en="4.1 Equal Opportunity and Non-Discrimination" data-ar="4.1 تكافؤ الفرص وعدم التمييز"></div>
                                        <p><span class="tr" data-en="Everscopes provides equal opportunity in hiring, promotion, and day-to-day treatment, without discrimination based on gender, religion, disability, marital status, or any other characteristic protected under Egyptian Labor Law." data-ar="توفر إيفرسكوبس تكافؤ الفرص في التوظيف والترقية والمعاملة اليومية، بدون تمييز بسبب الجنس أو الدين أو الإعاقة أو الحالة الاجتماعية أو أي سمة أخرى محمية بموجب قانون العمل المصري."></span></p>
                                    </div>
                                    <div class="coc-subsection">
                                        <div class="coc-subsection-title tr" data-en="4.2 Anti-Harassment" data-ar="4.2 مكافحة التحرش"></div>
                                        <p><span class="tr" data-en="Harassment, bullying, or inappropriate conduct of any kind — between colleagues, toward clients, or toward site/developer staff during property visits — is strictly prohibited and will result in disciplinary action." data-ar="التحرش أو التنمر أو السلوك غير اللائق من أي نوع — بين الزملاء أو تجاه العملاء أو تجاه موظفي الموقع/المطور أثناء زيارات العقارات — محظور تماماً وسيؤدي إلى إجراءات تأديبية."></span></p>
                                    </div>
                                    <div class="coc-subsection">
                                        <div class="coc-subsection-title tr" data-en="4.3 Health and Safety" data-ar="4.3 الصحة والسلامة"></div>
                                        <p><span class="tr" data-en="Employees conducting property site visits, including to construction sites, must follow all applicable safety precautions and Company guidance, and must never place themselves or clients in unsafe conditions to close a sale." data-ar="يجب على الموظفين الذين يجرون زيارات لمواقع العقارات، بما في ذلك مواقع البناء، اتباع جميع احتياطات السلامة المعمول بها وإرشادات الشركة، وعدم تعريض أنفسهم أو عملائهم لظروف غير آمنة لإغلاق عملية بيع."></span></p>
                                    </div>
                                    <div class="coc-subsection">
                                        <div class="coc-subsection-title tr" data-en="4.4 Sales Floor Conduct" data-ar="4.4 سلوك قسم المبيعات"></div>
                                        <p><span class="tr" data-en="Healthy competition between sales teams is encouraged; undermining colleagues, poaching a colleague's client relationship, or manipulating the CRM/lead system to claim another consultant's lead is a violation of this Code." data-ar="يُشجع التنافس الصحي بين فرق المبيعات؛ الإضرار بالزملاء أو اختطاف علاقة عميل زميل أو التلاعب بنظام إدارة العملاء/العملاء المحتملين لادعاء عميل مستشار آخر يُعد انتهاكاً لهذه المدونة."></span></p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Section 5 -->
                        <div class="coc-accordion-item">
                            <button class="coc-accordion-trigger" aria-expanded="false">
                                <div class="coc-accordion-num">05</div>
                                <div class="coc-accordion-label tr" data-en="Confidentiality and Data Protection" data-ar="السرية وحماية البيانات"></div>
                                <i class="fas fa-chevron-down coc-accordion-arrow"></i>
                            </button>
                            <div class="coc-accordion-body">
                                <div class="coc-accordion-body-inner">
                                    <p><span class="tr" data-en="Client phone numbers, financial details, and purchase intentions are confidential and must only be used for legitimate Everscops business. Client databases and leads remain Company property and must not be copied, exported, or taken by an employee upon resignation or termination." data-ar="أرقام هواتف العملاء والتفاصيل المالية ونوايا الشراء سرية ويجب استخدامها فقط لأعمال إيفرسكوبس المشروعة. تظل قواعد بيانات العملاء والعملاء المحتملين ملكاً للشركة ولا يجب نسخها أو تصديرها أو أخذها من قبل الموظف عند الاستقالة أو إنهاء الخدمة."></span></p>
                                    <p><span class="tr" data-en="Commercial terms with developers, pricing strategies, and internal sales data must not be shared outside the Company, including with competitor agencies or former colleagues who have left Everscops." data-ar="يجب عدم مشاركة الشروط التجارية مع المطورين واستراتيجيات التسعير وبيانات المبيعات الداخلية خارج الشركة، بما في ذلك مع الوكالات المنافسة أو الزملاء السابقين الذين غادروا إيفرسكوبس."></span></p>
                                </div>
                            </div>
                        </div>

                                <div class="coc-accordion-num">06</div>

                            </button>
                            <div class="coc-accordion-body">
                                <div class="coc-accordion-body-inner">
                                    <p><span class="tr" data-en="Employees who market properties or the Everscops brand on personal social media accounts must ensure all content is accurate, professional, and consistent with this Code. Employees must not use Company-owned property photos, floor plans, or client information after leaving the Company, and must not make public statements on behalf of Everscops without authorization." data-ar="يجب على الموظفين الذين يسوقون العقارات أو علامة إيفرسكوبس التجارية على حساباتهم الشخصية في وسائل التواصل الاجتماعي التأكد من أن جميع المحتوى دقيق واحترافي ومتسق مع هذه المدونة. يجب على الموظفين عدم استخدام صور العقارات المملوكة للشركة أو مخططات الطوابق أو معلومات العملاء بعد مغادرة الشركة، ويجب عدم إصدار بيانات علنية نيابة عن إيفرسكوبس بدون تفويض."></span></p>
                                </div>
                            </div>
                        </div>

                        <!-- Section 7 -->

                            <button class="coc-accordion-trigger" aria-expanded="false">
                                <div class="coc-accordion-num">07</div>
                                <div class="coc-accordion-label tr" data-en="Compliance with Laws and Regulations" data-ar="الامتثال للقوانين واللوائح"></div>
                                <i class="fas fa-chevron-down coc-accordion-arrow"></i>
                            </button>
                            <div class="coc-accordion-body">
                                <div class="coc-accordion-body-inner">
                                    <p><span class="tr" data-en="All employees must comply with the Egyptian Real Estate Brokerage regulations, tax and registration requirements applicable to property transactions, consumer protection rules in marketing, and all relevant labor and commercial laws. Employees engaged in licensed brokerage activity must maintain any required registrations or certifications in good standing." data-ar="يجب على جميع الموظفين الامتثال للوائح الوساطة العقارية المصرية ومتطلبات الضرائب والتسجيل المعمول بها في معاملات العقارات وقrules حماية المستهلك في التسويق وجميع قوانين العمل والتجارة ذات الصلة. يجب على الموظفين المشاركين في نشاط الوساطة المرخص الحفاظ على أي تسجيلات أو شهادات مطلوبة بحالة سليمة."></span></p>
                                </div>
                            </div>
                        </div>

                        <!-- Section 8 -->
                        <div class="coc-accordion-item">
                            <button class="coc-accordion-trigger" aria-expanded="false">
                                <div class="coc-accordion-num">08</div>

                            <div class="coc-accordion-body">
                                <div class="coc-accordion-body-inner">
                                    <p><span class="tr" data-en="Employees who witness or suspect a violation of this Code — including misrepresentation to a client, undisclosed commissions, or suspicious transactions — must report it promptly through one of the following channels:" data-ar="يجب على الموظفين الذين يشهدون أو يشتبهون في انتهاك لهذه المدونة — بما في ذلك التضليل للعميل أو العمولات غير المعلنة أو المعاملات المشبوهة — الإبلاغ عنه فوراً عبر أحد القنوات التالية:"></span></p>
                                    <p><span class="tr" data-en="• Their direct Sales Manager or Team Leader
• The Human Resources Department
• The Compliance Officer, via the confidential reporting channel" data-ar="• مدير المبيعات المباشر أو قائد الفريق
• قسم الموارد البشرية
• مسؤول الامتثال، عبر قناة الإبلاغ السرية"></span></p>
                                    <p><span class="tr" data-en="Everscops prohibits retaliation against any employee who reports a concern in good faith. Reports are handled with discretion and investigated fairly." data-ar="تحظر إيفرسكوبس الانتقام من أي موظف يبلغ عن مخاوف بحسن نية. تُعامل البلاغات بسرية وتُحقق فيها بعدالة."></span></p>
                                </div>
                            </div>
                        </div>

                        <!-- Section 9 -->
                        <div class="coc-accordion-item">
                            <button class="coc-accordion-trigger" aria-expanded="false">
                                <div class="coc-accordion-num">09</div>
                                <div class="coc-accordion-label tr" data-en="Consequences of Violations" data-ar="عواقب الانتهاكات"></div>
                                <i class="fas fa-chevron-down coc-accordion-arrow"></i>
                            </button>
                            <div class="coc-accordion-body">
                                <div class="coc-accordion-body-inner">
                                    <p><span class="tr" data-en="Violations of this Code — particularly those involving client deception, undisclosed commissions, or mishandling of client funds — may result in disciplinary action up to and including termination, forfeiture of commission, and referral to the relevant authorities where the conduct may be unlawful." data-ar="انتهاكات هذه المدونة — خاصة تلك التي تتضمن خداع العميل أو العمولات غير المعلنة أو سوء التعامل مع أموال العملاء — قد تؤدي إلى إجراءات تأديبية تصل إلى وإدراج إنهاء الخدمة ومصادرة العمولة والإحالة إلى الجهات المختصة حيث قد يكون السلوك غير قانوني."></span></p>

                                    <p><span class="tr" data-en="All employees, including sales consultants and property advisors, must acknowledge this Code upon joining Everscops and on an annual basis thereafter." data-ar="يجب على جميع الموظفين، بما في ذلك مستشاري المبيعات ومستشاري العقارات، الاعتراف بهذه المدونة عند الانضمام إلى إيفرسكوبس وعلى أساس سنوي بعد ذلك."></span></p>

    <!-- Back to Top -->
    <button class="back-to-top" id="backToTop" aria-label="Back to top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script>
        // ===== LANGUAGE SWITCHING =====
        let currentLang = 'en';
        const langToggle = document.getElementById('langToggle');

        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            applyLanguage();
        });

        function applyLanguage() {
            const html = document.documentElement;
            html.lang = currentLang;
            html.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

            document.querySelectorAll('.tr').forEach(el => {
                const text = el.getAttribute('data-' + currentLang);
                if (text) el.textContent = text;
            });

            document.querySelectorAll('.rec-step-arrow i').forEach(icon => {
                icon.className = currentLang === 'ar' ? 'fas fa-arrow-left' : 'fas fa-arrow-right';
            });

            document.title = currentLang === 'ar'
                ? 'إيفرسكوبس — دليل الموظفين'
                : 'Everscops — Employee Handbook';
        }

        applyLanguage();

        // ===== LOADER =====
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 2000);
        });

        // ===== NAVBAR SCROLL =====
        const navbar = document.getElementById('navbar');
        const backToTop = document.getElementById('backToTop');

        window.addEventListener('scroll', () => {
            navbar.classList.toggle('scrolled', window.scrollY > 50);
            backToTop.classList.toggle('visible', window.scrollY > 500);

            const sections = document.querySelectorAll('.section, .mission-section, .contact-section');
            const navLinksEls = document.querySelectorAll('.nav-links a');
            let current = '';

            sections.forEach(section => {
                if (window.scrollY >= section.offsetTop - 150) {
                    current = section.getAttribute('id');
                }
            });

            navLinksEls.forEach(link => {
                link.classList.toggle('active', link.getAttribute('href') === '#' + current);
            });
        });

        backToTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ===== MOBILE NAV =====
        const navToggleBtn = document.getElementById('navToggle');
        const navLinksMenu = document.getElementById('navLinks');

        navToggleBtn.addEventListener('click', () => {
            navToggleBtn.classList.toggle('active');
            navLinksMenu.classList.toggle('open');
        });

        navLinksMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navToggleBtn.classList.remove('active');
                navLinksMenu.classList.remove('open');
            });
        });

        // ===== SCROLL REVEAL =====
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

        document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

        // ===== 3D TILT ON CARDS =====
        document.querySelectorAll('.value-card, .policy-card, .culture-card, .contact-card, .env-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const rotateX = ((e.clientY - rect.top) - rect.height / 2) / 20;
                const rotateY = (rect.width / 2 - (e.clientX - rect.left)) / 20;
                card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-8px)`;
            });
            card.addEventListener('mouseleave', () => { card.style.transform = ''; });
        });

        // ===== CODE OF CONDUCT ACCORDION =====
        document.querySelectorAll('.coc-accordion-trigger').forEach(trigger => {
            trigger.addEventListener('click', () => {
                const item = trigger.closest('.coc-accordion-item');
                const body = item.querySelector('.coc-accordion-body');
                const isOpen = item.classList.contains('open');

                // Close all
                document.querySelectorAll('.coc-accordion-item').forEach(i => {
                    i.classList.remove('open');
                    i.querySelector('.coc-accordion-trigger').setAttribute('aria-expanded', 'false');
                    i.querySelector('.coc-accordion-body').style.maxHeight = null;
                });

                // Open clicked if it was closed
                if (!isOpen) {
                    item.classList.add('open');
                    trigger.setAttribute('aria-expanded', 'true');
                    body.style.maxHeight = body.scrollHeight + 'px';
                }
            });
        });

        // ===== PARTICLES CANVAS =====
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.3 + 0.05;
                this.color = Math.random() > 0.5 ? '255, 107, 0' : '212, 165, 116';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
                ctx.fill();
            }
        }

        const particleCount = Math.min(60, Math.floor(window.innerWidth / 25));
        for (let i = 0; i < particleCount; i++) particles.push(new Particle());

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(255, 107, 0, ${0.03 * (1 - dist / 150)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            animationId = requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ===== SMOOTH SCROLL =====
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    window.scrollTo({ top: target.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' });
                }
            });
        });

        // ===== REDUCE MOTION =====
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            cancelAnimationFrame(animationId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
        }
    </script>
